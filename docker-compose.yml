services:
  db:
    image: postgres:15
    container_name: carspecs_db
    environment:
      POSTGRES_USER: ${DB_USER:-carspecs_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: ${DB_NAME:-carspecs_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-carspecs_admin} -d ${DB_NAME:-carspecs_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.17.0
    container_name: carspecs_elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 5s
      retries: 20

  auth_service:
    build:
      context: ./services/auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    command: gunicorn auth_service.wsgi:application --bind 0.0.0.0:8004 --workers 2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carspecs_db}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8004:8004"
    restart: unless-stopped

  vehicle_service:
    build:
      context: ./services/vehicle_service
      dockerfile: Dockerfile
    container_name: vehicle_service
    command: gunicorn vehicle_service.wsgi:application --bind 0.0.0.0:8001 --workers 2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carspecs_db}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8001:8001"
    restart: unless-stopped

  vin_service:
    build:
      context: ./services/vin_service
      dockerfile: Dockerfile
    container_name: vin_service
    command: gunicorn vin_service.wsgi:application --bind 0.0.0.0:8002 --workers 2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carspecs_db}
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    ports:
      - "8002:8002"
    restart: unless-stopped

  valuation_service:
    build:
      context: ./services/valuation_service
      dockerfile: Dockerfile
    container_name: valuation_service
    command: gunicorn valuation_service.wsgi:application --bind 0.0.0.0:8003 --workers 2
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-carspecs_db}
      AUTH_SERVICE_URL: http://auth_service:8000
      VEHICLE_SERVICE_URL: http://vehicle_service:8001
      VIN_SERVICE_URL: http://vin_service:8002
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      db:
        condition: service_healthy
      auth_service:
        condition: service_started
      vehicle_service:
        condition: service_started
      vin_service:
        condition: service_started
    ports:
      - "8003:8003"
    restart: unless-stopped

  frontend_next:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: frontend_next
    env_file:
      - .env
    environment:
      NODE_ENV: production
      AUTH_SERVICE_URL: http://auth_service:8004
      VEHICLE_SERVICE_URL: http://vehicle_service:8001
      VIN_SERVICE_URL: http://vin_service:8002
      VALUATION_SERVICE_URL: http://valuation_service:8003
      NEXT_PUBLIC_ENABLE_MASTERS: ${NEXT_PUBLIC_ENABLE_MASTERS:-true}
    depends_on:
      auth_service:
        condition: service_started
      vehicle_service:
        condition: service_started
      vin_service:
        condition: service_started
      valuation_service:
        condition: service_started
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: carspecs_gateway
    depends_on:
      frontend_next:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

volumes:
  postgres_data:
  es_data:
