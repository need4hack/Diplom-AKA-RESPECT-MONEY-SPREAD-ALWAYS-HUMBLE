events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Upstream services ──────────────────────────────────
    upstream auth {
        server auth_service:8000;
    }

    upstream vehicle {
        server vehicle_service:8001;
    }

    upstream vin {
        server vin_service:8002;
    }

    upstream valuation {
        server valuation_service:8003;
    }

    server {
        listen 80;
        server_name localhost;

        # ─── Frontend static files ─────────────────────────
        root /usr/share/nginx/html;
        index portal.html;

        location / {
            try_files $uri $uri/ /portal.html;
        }

        # ─── API reverse proxy ─────────────────────────────
        location /api/auth/ {
            proxy_pass http://auth;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vehicles/ {
            proxy_pass http://vehicle;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/vin/ {
            proxy_pass http://vin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/valuation/ {
            proxy_pass http://valuation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── Admin interfaces ──────────────────────────────
        location /admin/auth/ {
            proxy_pass http://auth/admin/;
            proxy_set_header Host $host;
        }
        location /admin/vehicle/ {
            proxy_pass http://vehicle/admin/;
            proxy_set_header Host $host;
        }
        location /admin/vin/ {
            proxy_pass http://vin/admin/;
            proxy_set_header Host $host;
        }
        location /admin/valuation/ {
            proxy_pass http://valuation/admin/;
            proxy_set_header Host $host;
        }
    }
}
